<!DOCTYPE html>
<html>
<head>
<meta name="Background" content="width=device-width, initial-scale=1">
<style>
body, html {
  height: 100%;
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
}

                                                                                                                                        /*BACKGROUND*/  
.bg {
  /* The image used */
  background-image: url("foodtruck.jpg");

  /* Add the blur effect */
  filter: blur(8px);
  -webkit-filter: blur(8px);
  
  /* Full height */
  height: 100%; 

  /* Center and scale the image nicely */
  background-position: center;
  background-repeat: repeat;
  background-size: cover;
}


                                                                                                                                    /*First Text Box*/
/* Position text in the middle of the page/image */
.bg-text {
  background-color: rgb(0,0,0); /* Fallback color */
  background-color: rgba(0,0,0, 0.4); /* Black w/opacity/see-through */
  color: white;
  font-weight: bold;
  border: 3px solid #f1f1f1;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
  width: 50%;  /*Previously 80%*/
  padding: 20px;
  text-align: center;
}


  
</style>
</head>

<body>

    <div class="bg">                                                                                           <!-- Background -->

    <div class="bg-text">    <!-- Middle Text Box -->
      <p style="line-height: 1.0; font-size:200px"; color:white;">
        Taqueria<br>
        Fiesta<br>
        Latina
      </p>
  
    </div>

    <h style="line-height: 1.0; font-size:200px"; color:white;">Menu</h>                                              <!-- MENU -->
    </div> 
  

</body>
</html>
